<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 20" width="100%" height="20" fill="none">
  <style>
    .pulse-glow {
      animation: pulse 3s infinite ease-in-out;
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.3; r: 2px; }
      50% { opacity: 1; r: 4px; }
    }
  </style>
  <defs>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4F46E5" stop-opacity="0" />
      <stop offset="15%" stop-color="#4F46E5" stop-opacity="0.2" />
      <stop offset="50%" stop-color="#06B6D4" stop-opacity="1" />
      <stop offset="85%" stop-color="#8B5CF6" stop-opacity="0.2" />
      <stop offset="100%" stop-color="#8B5CF6" stop-opacity="0" />
    </linearGradient>
    <filter id="neonGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  <!-- Background Grid Ticks -->
  <path d="M 100 0 L 100 8 M 200 0 L 200 8 M 300 0 L 300 8 M 400 0 L 400 8 M 500 0 L 500 12 M 600 0 L 600 8 M 700 0 L 700 8 M 800 0 L 800 8 M 900 0 L 900 8" stroke="#ffffff" stroke-opacity="0.07" stroke-width="1" />
  <!-- Main Glowing Divider Line -->
  <line x1="50" y1="10" x2="950" y2="10" stroke="url(#lineGrad)" stroke-width="2" filter="url(#neonGlow)" />
  <!-- Center Command Core -->
  <circle cx="500" cy="10" r="3" fill="#06B6D4" class="pulse-glow" filter="url(#neonGlow)" />
  <circle cx="500" cy="10" r="1.5" fill="#F8FAFC" />
  <path d="M 480 10 L 490 10 M 510 10 L 520 10" stroke="#06B6D4" stroke-opacity="0.5" stroke-width="1" />
</svg>
