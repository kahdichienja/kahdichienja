<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" width="100%" height="100%" fill="none">
  <defs>
    <!-- Background Base -->
    <rect id="bg" width="1200" height="600" fill="#030712" />
    
    <!-- Blur Filter -->
    <filter id="auroraBlur" x="-20%" y="-20%" width="140%" height="140%" filterUnits="userSpaceOnUse">
      <feGaussianBlur stdDeviation="90" />
    </filter>
  </defs>
  
  <!-- Base Background -->
  <use href="#bg" />

  <!-- Dotted Grid Overlay -->
  <g opacity="0.12">
    <path d="M 0 50 L 1200 50 M 0 100 L 1200 100 M 0 150 L 1200 150 M 0 200 L 1200 200 M 0 250 L 1200 250 M 0 300 L 1200 300 M 0 350 L 1200 350 M 0 400 L 1200 400 M 0 450 L 1200 450 M 0 500 L 1200 500 M 0 550 L 1200 550" stroke="#ffffff" stroke-width="0.5" />
    <path d="M 100 0 L 100 600 M 200 0 L 200 600 M 300 0 L 300 600 M 400 0 L 400 600 M 500 0 L 500 600 M 600 0 L 600 600 M 700 0 L 700 600 M 800 0 L 800 600 M 900 0 L 900 600 M 1000 0 L 1000 600 M 1100 0 L 1100 600" stroke="#ffffff" stroke-width="0.5" />
  </g>

  <!-- Glowing Aurora Orbs -->
  <g filter="url(#auroraBlur)" opacity="0.6">
    <!-- Top-Left Indigo Orb -->
    <circle cx="200" cy="150" r="220" fill="#4F46E5" opacity="0.45" />
    <!-- Mid-Right Cyan Orb -->
    <circle cx="950" cy="250" r="200" fill="#06B6D4" opacity="0.4" />
    <!-- Bottom-Center Violet Orb -->
    <circle cx="550" cy="480" r="240" fill="#8B5CF6" opacity="0.35" />
  </g>
</svg>
