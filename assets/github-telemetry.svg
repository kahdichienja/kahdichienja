<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 200" width="100%" height="100%" fill="none">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@600;700&amp;family=JetBrains+Mono:wght@400;700&amp;display=swap');
      
      .lbl-main {
        font-family: 'Outfit', sans-serif;
        font-weight: 700;
        font-size: 13px;
        fill: #F8FAFC;
        letter-spacing: 0.05em;
      }
      .lbl-tag {
        font-family: 'JetBrains Mono', monospace;
        font-size: 9px;
        fill: #64748B;
      }
      .lbl-val {
        font-family: 'JetBrains Mono', monospace;
        font-size: 11px;
        fill: #06B6D4;
        font-weight: 700;
      }
      
      /* Server Ticks Animation */
      .tick-slow { animation: tickPulse 3s infinite ease-in-out; }
      .tick-fast { animation: tickPulse 1.2s infinite ease-in-out; }
      .cpu-core-1 { animation: coreLoad1 2s infinite alternate ease-in-out; }
      .cpu-core-2 { animation: coreLoad2 2.5s infinite alternate ease-in-out; }
      .led-flash-1 { animation: ledFlash 0.6s infinite alternate ease-in-out; }
      .led-flash-2 { animation: ledFlash 0.8s infinite alternate ease-in-out; }
      .led-flash-3 { animation: ledFlash 1.1s infinite alternate ease-in-out; }
      
      @keyframes tickPulse {
        0%, 100% { opacity: 0.3; }
        50% { opacity: 1; }
      }
      @keyframes coreLoad1 {
        0% { width: 30px; }
        100% { width: 110px; }
      }
      @keyframes coreLoad2 {
        0% { width: 90px; }
        100% { width: 40px; }
      }
      @keyframes ledFlash {
        0% { fill: #111827; stroke: #374151; }
        100% { fill: #22C55E; stroke: #4ADE80; }
      }
    </style>
    
    <filter id="neonGreen" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    
    <pattern id="chassisHoles" width="8" height="8" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="#ffffff" fill-opacity="0.03" />
    </pattern>
  </defs>

  <!-- Server 1U Chassis Background -->
  <rect width="1200" height="200" rx="8" fill="#111827" stroke="#ffffff" stroke-opacity="0.08" stroke-width="1.5" />
  <!-- Pattern Overlay representing ventilation mesh -->
  <rect width="1200" height="200" rx="8" fill="url(#chassisHoles)" />
  
  <!-- Outer Bezel Frame Line -->
  <rect x="10" y="10" width="1180" height="180" rx="6" fill="#030712" fill-opacity="0.8" stroke="#ffffff" stroke-opacity="0.04" stroke-width="1.5" />

  <!-- ================= MODULE 1: COMMITS CORE ================= -->
  <!-- Left Boundary -->
  <line x1="300" y1="20" x2="300" y2="180" stroke="#ffffff" stroke-opacity="0.05" stroke-width="1" />
  
  <g transform="translate(40, 30)">
    <!-- Server Status Indicator -->
    <circle cx="15" cy="15" r="3" fill="#22C55E" filter="url(#neonGreen)" class="tick-slow" />
    <text x="30" y="18" class="lbl-main">CPU_COMMITS_CORE</text>
    <text x="30" y="32" class="lbl-tag">UPLINK_FREQUENCY: DAILY_CRON</text>
    
    <!-- Core CPU Load Metrics -->
    <g transform="translate(30, 50)">
      <text x="0" y="10" class="lbl-tag">CORE_00 [MASTER]:</text>
      <rect x="110" y="2" width="120" height="8" rx="2" fill="#ffffff" fill-opacity="0.03" />
      <rect x="110" y="2" width="70" height="8" rx="2" fill="#06B6D4" class="cpu-core-1" />
      
      <text x="0" y="28" class="lbl-tag">CORE_01 [DEV]:</text>
      <rect x="110" y="20" width="120" height="8" rx="2" fill="#ffffff" fill-opacity="0.03" />
      <rect x="110" y="20" width="105" height="8" rx="2" fill="#8B5CF6" class="cpu-core-2" />
      
      <text x="0" y="55" class="lbl-tag">TOTAL_COMMITS:</text>
      <text x="110" y="55" class="lbl-val" fill="#22C55E">1,842 commits</text>
      
      <text x="0" y="72" class="lbl-tag">LOAD_FACTOR:</text>
      <text x="110" y="72" class="lbl-val">PEAK_STABLE</text>
    </g>
  </g>


  <!-- ================= MODULE 2: PULL REQUESTS NETWORK ================= -->
  <!-- Middle Boundary 1 -->
  <line x1="600" y1="20" x2="600" y2="180" stroke="#ffffff" stroke-opacity="0.05" stroke-width="1" />
  
  <g transform="translate(330, 30)">
    <!-- PR Status Indicator -->
    <circle cx="15" cy="15" r="3" fill="#06B6D4" class="tick-fast" />
    <text x="30" y="18" class="lbl-main">NET_PULL_REQUESTS</text>
    <text x="30" y="32" class="lbl-tag">INTERFACE: ETH_01 (10Gbps)</text>
    
    <!-- Telemetry specs -->
    <g transform="translate(30, 50)" class="lbl-tag">
      <text x="0" y="10">MERGED_PR_COUNT:</text>
      <text x="130" y="10" class="lbl-val" fill="#06B6D4">247 MERGED</text>
      
      <text x="0" y="28">COLLABORATIONS:</text>
      <text x="130" y="28" class="lbl-val">9 ORGANIZATIONS</text>
      
      <text x="0" y="46">CONFLICT_RATE:</text>
      <text x="130" y="46" class="lbl-val" fill="#22C55E">0.00% (STABLE)</text>
      
      <!-- Network flashing link status visualizer -->
      <text x="0" y="72">LINK_IO_TRAFFIC:</text>
      <circle cx="135" cy="69" r="4.5" fill="#22C55E" class="led-flash-1" />
      <circle cx="150" cy="69" r="4.5" fill="#22C55E" class="led-flash-2" />
      <circle cx="165" cy="69" r="4.5" fill="#22C55E" class="led-flash-3" />
      <circle cx="180" cy="69" r="4.5" fill="#111827" stroke="#374151" stroke-width="1" />
    </g>
  </g>


  <!-- ================= MODULE 3: ACTIVE REPOS / DISK ARRAY ================= -->
  <!-- Middle Boundary 2 -->
  <line x1="900" y1="20" x2="900" y2="180" stroke="#ffffff" stroke-opacity="0.05" stroke-width="1" />
  
  <g transform="translate(630, 30)">
    <circle cx="15" cy="15" r="3" fill="#8B5CF6" class="tick-slow" />
    <text x="30" y="18" class="lbl-main">ACTIVE_STORAGE_NODES</text>
    <text x="30" y="32" class="lbl-tag">ARRAY: 32 ACTIVE REPOSITORIES</text>
    
    <!-- 3x4 Disk array LED indicators -->
    <g transform="translate(30, 55)">
      <!-- Disk indicators row 1 -->
      <circle cx="10" cy="10" r="5" fill="#22C55E" class="led-flash-1" />
      <circle cx="30" cy="10" r="5" fill="#22C55E" class="led-flash-2" />
      <circle cx="50" cy="10" r="5" fill="#22C55E" class="led-flash-3" />
      <circle cx="70" cy="10" r="5" fill="#22C55E" class="led-flash-1" />
      
      <!-- Disk indicators row 2 -->
      <circle cx="10" cy="30" r="5" fill="#22C55E" class="led-flash-3" />
      <circle cx="30" cy="30" r="5" fill="#22C55E" class="led-flash-1" />
      <circle cx="50" cy="30" r="5" fill="#22C55E" class="led-flash-2" />
      <circle cx="70" cy="30" r="5" fill="#22C55E" class="led-flash-3" />

      <!-- Disk indicators row 3 -->
      <circle cx="10" cy="50" r="5" fill="#22C55E" class="led-flash-2" />
      <circle cx="30" cy="50" r="5" fill="#22C55E" class="led-flash-3" />
      <circle cx="50" cy="50" r="5" fill="#22C55E" class="led-flash-1" />
      <circle cx="70" cy="50" r="5" fill="#22C55E" class="led-flash-2" />
      
      <!-- Metrics text -->
      <g transform="translate(100, 5)" class="lbl-tag">
        <text x="0" y="10">ARRAY_STATUS: <tspan class="lbl-val" fill="#22C55E">OK</tspan></text>
        <text x="0" y="25">HOT_SPARE: <tspan class="lbl-val" fill="#8B5CF6">ONLINE</tspan></text>
        <text x="0" y="40">SECTOR_ERRS: <tspan class="lbl-val" fill="#22C55E">0B</tspan></text>
      </g>
    </g>
  </g>


  <!-- ================= MODULE 4: MEMORY / LANGUAGES ARRAY ================= -->
  <g transform="translate(930, 30)">
    <circle cx="15" cy="15" r="3" fill="#22C55E" class="tick-slow" />
    <text x="30" y="18" class="lbl-main">MEM_LANGUAGE_ALLOC</text>
    <text x="30" y="32" class="lbl-tag">RESOURCE_PARTITION: COMMITS</text>
    
    <!-- RAM Segment Allocation bars -->
    <g transform="translate(30, 52)">
      <!-- Dart (Flutter) -->
      <text x="0" y="10" class="lbl-tag" fill="#06B6D4">DART / FLUTTER (45%)</text>
      <rect x="0" y="14" width="200" height="4" rx="1" fill="#ffffff" fill-opacity="0.03" />
      <rect x="0" y="14" width="90" height="4" rx="1" fill="#06B6D4" />
      
      <!-- Python (Django/FastAPI) -->
      <text x="0" y="30" class="lbl-tag" fill="#4F46E5">PYTHON (30%)</text>
      <rect x="0" y="34" width="200" height="4" rx="1" fill="#ffffff" fill-opacity="0.03" />
      <rect x="0" y="34" width="60" height="4" rx="1" fill="#4F46E5" />
      
      <!-- TypeScript (React/MUI) -->
      <text x="0" y="50" class="lbl-tag" fill="#8B5CF6">TS / JS (15%)</text>
      <rect x="0" y="54" width="200" height="4" rx="1" fill="#ffffff" fill-opacity="0.03" />
      <rect x="0" y="54" width="30" height="4" rx="1" fill="#8B5CF6" />
      
      <!-- C++ (Edge Sensors / ESP32) -->
      <text x="0" y="70" class="lbl-tag" fill="#F59E0B">C++ / EDGE (10%)</text>
      <rect x="0" y="74" width="200" height="4" rx="1" fill="#ffffff" fill-opacity="0.03" />
      <rect x="0" y="74" width="20" height="4" rx="1" fill="#F59E0B" />
    </g>
  </g>
</svg>
