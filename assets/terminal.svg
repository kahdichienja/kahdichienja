<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 320" width="100%" height="100%" fill="none">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&amp;display=swap');
      
      .terminal-txt {
        font-family: 'JetBrains Mono', monospace;
        font-size: 12px;
        fill: #94A3B8;
      }
      .green-txt {
        fill: #22C55E;
        font-weight: 700;
      }
      .cyan-txt {
        fill: #06B6D4;
        font-weight: 700;
      }
      .amber-txt {
        fill: #F59E0B;
      }
      .white-txt {
        fill: #F8FAFC;
      }
      
      .blink-cursor {
        animation: blink 1.2s infinite steps(2, start);
      }
      .crt-line {
        animation: scanline 8s infinite linear;
      }
      .scroll-container {
        animation: infiniteScroll 16s infinite linear;
      }
      
      @keyframes blink {
        to { visibility: hidden; }
      }
      @keyframes scanline {
        0% { transform: translateY(0); }
        100% { transform: translateY(320px); }
      }
      @keyframes infiniteScroll {
        0% { transform: translateY(0px); }
        100% { transform: translateY(-288px); }
      }
    </style>

    <!-- Fading Mask for seamless log entry/exit -->
    <linearGradient id="fadeGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0" />
      <stop offset="15%" stop-color="#ffffff" stop-opacity="1" />
      <stop offset="85%" stop-color="#ffffff" stop-opacity="1" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0" />
    </linearGradient>
    
    <mask id="logMask">
      <rect x="0" y="55" width="1200" height="210" fill="url(#fadeGrad)" />
    </mask>
  </defs>

  <!-- Terminal Window Backdrop -->
  <rect width="1200" height="320" rx="12" fill="#030712" stroke="#ffffff" stroke-opacity="0.06" stroke-width="1.5" />
  
  <!-- Header Bar -->
  <path d="M 0 12 Q 0 0 12 0 L 1188 0 Q 1200 0 1200 12 L 1200 35 L 0 35 Z" fill="#111827" fill-opacity="0.9" stroke="#ffffff" stroke-opacity="0.04" stroke-width="1" />
  
  <!-- Window Control Buttons (macOS style) -->
  <circle cx="25" cy="17" r="6" fill="#EF4444" />
  <circle cx="45" cy="17" r="6" fill="#F59E0B" />
  <circle cx="65" cy="17" r="6" fill="#22C55E" />
  
  <!-- Terminal Title -->
  <text x="600" y="21" family="'JetBrains Mono', monospace" font-size="11" fill="#64748B" font-weight="700" text-anchor="middle">CLINTON@MISSION-CONTROL: ~/_SYS_DIAGNOSTICS</text>

  <!-- Scrolling Logs Group (Masked) -->
  <g mask="url(#logMask)">
    <!-- Base translation container -->
    <g transform="translate(30, 80)">
      <g class="scroll-container terminal-txt">
        <!-- FIRST SET OF LOGS (H = 288px) -->
        <!-- Y: 0 -->
        <text x="0" y="0"><tspan class="green-txt">[ OK ]</tspan> Initializing ESP32 edge transceivers (RFM95W LoRa Modules)...</text>
        <!-- Y: 24 -->
        <text x="0" y="24"><tspan class="green-txt">[ OK ]</tspan> Synchronizing GNSS tracking modules. 14 satellites acquired. 3D fix established (HDOP: 0.85).</text>
        <!-- Y: 48 -->
        <text x="0" y="48"><tspan class="cyan-txt">[ INFO ]</tspan> Mapping local P2P LoRa mesh nodes: 42 active relays in route.</text>
        <!-- Y: 72 -->
        <text x="0" y="72"><tspan class="green-txt">[ OK ]</tspan> Mounting partition /dev/sda1 (PostgreSQL multi-AZ cluster master replication)...</text>
        <!-- Y: 96 -->
        <text x="0" y="96"><tspan class="green-txt">[ OK ]</tspan> Launching Django REST engine &amp; Channels WS WebSocket listeners...</text>
        <!-- Y: 120 -->
        <text x="0" y="120"><tspan class="green-txt">[ OK ]</tspan> Kubernetes ingress controller routing healthz status: <tspan class="green-txt">NOMINAL</tspan>.</text>
        <!-- Y: 144 -->
        <text x="0" y="144"><tspan class="cyan-txt">[ INFO ]</tspan> Listening for biometric telemetry data on BLE UUID <tspan class="amber-txt">0x00FF01</tspan>.</text>
        <!-- Y: 168 -->
        <text x="0" y="168"><tspan class="green-txt">[ OK ]</tspan> MinIO distributed object storage bucket synchronized (Media &amp; Logs).</text>
        <!-- Y: 192 -->
        <text x="0" y="192"><tspan class="green-txt">[ OK ]</tspan> Apache Kafka event bus online. Client telemetry listeners active.</text>
        <!-- Y: 216 -->
        <text x="0" y="216"><tspan class="cyan-txt">[ INFO ]</tspan> Reverse proxy single entry portal forwarding traffic to microservices.</text>
        <!-- Y: 240 -->
        <text x="0" y="240"><tspan class="green-txt">[ OK ]</tspan> St. John's Ambulance telemetry client linked (Dev Mode active).</text>
        <!-- Y: 264 -->
        <text x="0" y="264"><tspan class="green-txt">[ OK ]</tspan> Nacare HMP registry engine online. Inpatient/Outpatient queue ready.</text>

        <!-- SECOND SET OF LOGS (DECORATIVE DUPLICATION FOR SEAMLESS LOOPING) -->
        <!-- Y: 288 -->
        <text x="0" y="288"><tspan class="green-txt">[ OK ]</tspan> Initializing ESP32 edge transceivers (RFM95W LoRa Modules)...</text>
        <!-- Y: 312 -->
        <text x="0" y="312"><tspan class="green-txt">[ OK ]</tspan> Synchronizing GNSS tracking modules. 14 satellites acquired. 3D fix established (HDOP: 0.85).</text>
        <!-- Y: 336 -->
        <text x="0" y="336"><tspan class="cyan-txt">[ INFO ]</tspan> Mapping local P2P LoRa mesh nodes: 42 active relays in route.</text>
        <!-- Y: 360 -->
        <text x="0" y="360"><tspan class="green-txt">[ OK ]</tspan> Mounting partition /dev/sda1 (PostgreSQL multi-AZ cluster master replication)...</text>
        <!-- Y: 384 -->
        <text x="0" y="384"><tspan class="green-txt">[ OK ]</tspan> Launching Django REST engine &amp; Channels WS WebSocket listeners...</text>
        <!-- Y: 408 -->
        <text x="0" y="408"><tspan class="green-txt">[ OK ]</tspan> Kubernetes ingress controller routing healthz status: <tspan class="green-txt">NOMINAL</tspan>.</text>
        <!-- Y: 432 -->
        <text x="0" y="432"><tspan class="cyan-txt">[ INFO ]</tspan> Listening for biometric telemetry data on BLE UUID <tspan class="amber-txt">0x00FF01</tspan>.</text>
        <!-- Y: 456 -->
        <text x="0" y="456"><tspan class="green-txt">[ OK ]</tspan> MinIO distributed object storage bucket synchronized (Media &amp; Logs).</text>
        <!-- Y: 480 -->
        <text x="0" y="480"><tspan class="green-txt">[ OK ]</tspan> Apache Kafka event bus online. Client telemetry listeners active.</text>
        <!-- Y: 504 -->
        <text x="0" y="504"><tspan class="cyan-txt">[ INFO ]</tspan> Reverse proxy single entry portal forwarding traffic to microservices.</text>
        <!-- Y: 528 -->
        <text x="0" y="528"><tspan class="green-txt">[ OK ]</tspan> St. John's Ambulance telemetry client linked (Dev Mode active).</text>
        <!-- Y: 552 -->
        <text x="0" y="552"><tspan class="green-txt">[ OK ]</tspan> Nacare HMP registry engine online. Inpatient/Outpatient queue ready.</text>
      </g>
    </g>
  </g>

  <!-- Active Prompt Command line at bottom -->
  <text x="30" y="295" class="terminal-txt" fill="#F8FAFC" font-weight="700">clinton@mission-control ~ % <tspan font-weight="400" fill="#94A3B8">listen --interface=lora0 --stream=metrics</tspan><tspan fill="#06B6D4" class="blink-cursor" font-weight="700">_</tspan></text>

  <!-- CRT Terminal Scanline Shadow -->
  <line x1="2" y1="0" x2="1198" y2="0" stroke="#ffffff" stroke-opacity="0.03" stroke-width="2" class="crt-line" />
</svg>
