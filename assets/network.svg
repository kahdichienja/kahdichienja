<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 250" width="100%" height="100%" fill="none">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@600&amp;family=JetBrains+Mono&amp;display=swap');
      
      .lbl-node {
        font-family: 'Outfit', sans-serif;
        font-size: 11px;
        fill: #F8FAFC;
      }
      .lbl-val {
        font-family: 'JetBrains Mono', monospace;
        font-size: 9px;
        fill: #06B6D4;
      }
      
      /* CSS Animations */
      .pulse-ring {
        animation: ringSpread 3s infinite ease-out;
      }
      .packet-hop {
        animation: hopPath 4s infinite linear;
      }
      
      @keyframes ringSpread {
        0% { r: 6px; opacity: 0.8; stroke-width: 1px; }
        100% { r: 24px; opacity: 0; stroke-width: 0.5px; }
      }
      @keyframes hopPath {
        from { stroke-dashoffset: 60; }
        to { stroke-dashoffset: 0; }
      }
    </style>
    
    <linearGradient id="meshGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8B5CF6" stop-opacity="0.1" />
      <stop offset="50%" stop-color="#06B6D4" stop-opacity="0.6" />
      <stop offset="100%" stop-color="#8B5CF6" stop-opacity="0.1" />
    </linearGradient>
  </defs>

  <!-- Deep Canvas -->
  <rect width="100%" height="100%" fill="#030712" />

  <!-- DOTTED BLUEPRINT BACKDROP -->
  <circle cx="200" cy="50" r="1" fill="#ffffff" fill-opacity="0.1" />
  <circle cx="400" cy="50" r="1" fill="#ffffff" fill-opacity="0.1" />
  <circle cx="600" cy="50" r="1" fill="#ffffff" fill-opacity="0.1" />
  <circle cx="800" cy="50" r="1" fill="#ffffff" fill-opacity="0.1" />
  <circle cx="1000" cy="50" r="1" fill="#ffffff" fill-opacity="0.1" />
  
  <circle cx="200" cy="125" r="1" fill="#ffffff" fill-opacity="0.1" />
  <circle cx="400" cy="125" r="1" fill="#ffffff" fill-opacity="0.1" />
  <circle cx="600" cy="125" r="1" fill="#ffffff" fill-opacity="0.1" />
  <circle cx="800" cy="125" r="1" fill="#ffffff" fill-opacity="0.1" />
  <circle cx="1000" cy="125" r="1" fill="#ffffff" fill-opacity="0.1" />

  <circle cx="200" cy="200" r="1" fill="#ffffff" fill-opacity="0.1" />
  <circle cx="400" cy="200" r="1" fill="#ffffff" fill-opacity="0.1" />
  <circle cx="600" cy="200" r="1" fill="#ffffff" fill-opacity="0.1" />
  <circle cx="800" cy="200" r="1" fill="#ffffff" fill-opacity="0.1" />
  <circle cx="1000" cy="200" r="1" fill="#ffffff" fill-opacity="0.1" />

  <!-- STATIC ROUTING PATHS -->
  <path d="M 600 125 L 400 75 M 600 125 L 450 175 M 600 125 L 750 75 M 600 125 L 800 175" stroke="#ffffff" stroke-opacity="0.05" stroke-width="2" />
  <path d="M 400 75 L 200 50 M 400 75 L 220 125 M 450 175 L 220 125 M 450 175 L 200 200" stroke="#8B5CF6" stroke-opacity="0.15" stroke-width="1.5" />
  <path d="M 750 75 L 980 50 M 750 75 L 1000 125 M 800 175 L 1000 125 M 800 175 L 980 200" stroke="#8B5CF6" stroke-opacity="0.15" stroke-width="1.5" />

  <!-- ACTIVE MESH ROUTING DATA FLOWS -->
  <path d="M 200 50 L 400 75" stroke="#8B5CF6" stroke-width="1.5" stroke-linecap="round" stroke-dasharray="6 30" class="packet-hop" />
  <path d="M 200 200 L 450 175" stroke="#8B5CF6" stroke-width="1.5" stroke-linecap="round" stroke-dasharray="6 30" class="packet-hop" />
  <path d="M 400 75 L 600 125" stroke="#06B6D4" stroke-width="2" stroke-linecap="round" stroke-dasharray="10 40" class="packet-hop" />
  <path d="M 450 175 L 600 125" stroke="#06B6D4" stroke-width="2" stroke-linecap="round" stroke-dasharray="8 35" class="packet-hop" />
  
  <path d="M 1000 125 L 750 75" stroke="#06B6D4" stroke-width="2" stroke-linecap="round" stroke-dasharray="10 40" class="packet-hop" />
  <path d="M 750 75 L 600 125" stroke="#06B6D4" stroke-width="2" stroke-linecap="round" stroke-dasharray="8 35" class="packet-hop" />

  <!-- CENTRAL GATEWAY NODE -->
  <g transform="translate(600, 125)">
    <circle cx="0" cy="0" r="28" fill="#111827" stroke="#06B6D4" stroke-width="2" />
    <circle cx="0" cy="0" r="16" fill="#030712" stroke="#4F46E5" stroke-width="1.5" />
    <circle cx="0" cy="0" r="5" fill="#22C55E" />
    <circle cx="0" cy="0" r="6" stroke="#22C55E" stroke-width="1" class="pulse-ring" />
    <text x="35" y="-5" class="lbl-node">MESH_GATEWAY_01</text>
    <text x="35" y="8" class="lbl-val">ONLINE (CELLULAR / GNSS_LOCK)</text>
  </g>

  <!-- LEFT MESH RELAYS -->
  <g transform="translate(400, 75)">
    <circle cx="0" cy="0" r="12" fill="#111827" stroke="#8B5CF6" stroke-width="1.5" />
    <circle cx="0" cy="0" r="4" fill="#06B6D4" />
    <circle cx="0" cy="0" r="6" stroke="#06B6D4" stroke-width="1" class="pulse-ring" />
    <text x="-15" y="-18" class="lbl-node" text-anchor="middle">RELAY_WEST_01</text>
    <text x="-15" y="-6" class="lbl-val" text-anchor="middle">RSSI -74dBm</text>
  </g>

  <g transform="translate(450, 175)">
    <circle cx="0" cy="0" r="12" fill="#111827" stroke="#8B5CF6" stroke-width="1.5" />
    <circle cx="0" cy="0" r="4" fill="#8B5CF6" />
    <text x="-15" y="18" class="lbl-node" text-anchor="middle">RELAY_WEST_02</text>
    <text x="-15" y="28" class="lbl-val" text-anchor="middle">RSSI -81dBm</text>
  </g>

  <!-- RIGHT MESH RELAYS -->
  <g transform="translate(750, 75)">
    <circle cx="0" cy="0" r="12" fill="#111827" stroke="#8B5CF6" stroke-width="1.5" />
    <circle cx="0" cy="0" r="4" fill="#06B6D4" />
    <circle cx="0" cy="0" r="6" stroke="#06B6D4" stroke-width="1" class="pulse-ring" />
    <text x="15" y="-18" class="lbl-node" text-anchor="middle">RELAY_EAST_01</text>
    <text x="15" y="-6" class="lbl-val" text-anchor="middle">RSSI -68dBm</text>
  </g>

  <g transform="translate(800, 175)">
    <circle cx="0" cy="0" r="12" fill="#111827" stroke="#8B5CF6" stroke-width="1.5" />
    <circle cx="0" cy="0" r="4" fill="#8B5CF6" />
    <text x="15" y="18" class="lbl-node" text-anchor="middle">RELAY_EAST_02</text>
    <text x="15" y="28" class="lbl-val" text-anchor="middle">RSSI -85dBm</text>
  </g>

  <!-- LEAF SENSOR NODES -->
  <!-- Left Nodes -->
  <circle cx="200" cy="50" r="5" fill="#111827" stroke="#8B5CF6" stroke-width="1.5" />
  <text x="185" y="48" class="lbl-mono" text-anchor="end">NODE_S01</text>

  <circle cx="220" cy="125" r="5" fill="#111827" stroke="#8B5CF6" stroke-width="1.5" />
  <text x="205" y="123" class="lbl-mono" text-anchor="end">NODE_S02</text>

  <circle cx="200" cy="200" r="5" fill="#111827" stroke="#8B5CF6" stroke-width="1.5" />
  <text x="185" y="198" class="lbl-mono" text-anchor="end">NODE_S03</text>

  <!-- Right Nodes -->
  <circle cx="980" cy="50" r="5" fill="#111827" stroke="#8B5CF6" stroke-width="1.5" />
  <text x="995" y="48" class="lbl-mono" text-anchor="start">NODE_S04</text>

  <circle cx="1000" cy="125" r="5" fill="#111827" stroke="#8B5CF6" stroke-width="1.5" />
  <circle cx="1000" cy="125" r="8" stroke="#06B6D4" stroke-width="0.5" class="pulse-ring" />
  <text x="1015" y="123" class="lbl-mono" text-anchor="start">NODE_S05</text>

  <circle cx="980" cy="200" r="5" fill="#111827" stroke="#8B5CF6" stroke-width="1.5" />
  <text x="995" y="198" class="lbl-mono" text-anchor="start">NODE_S06</text>
</svg>
