<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 550" width="100%" height="100%" fill="none">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&amp;family=JetBrains+Mono:wght@400;700&amp;display=swap');
      
      .title {
        font-family: 'Outfit', sans-serif;
        font-weight: 700;
        font-size: 16px;
        fill: #F8FAFC;
        letter-spacing: -0.02em;
      }
      .label-mono {
        font-family: 'JetBrains Mono', monospace;
        font-size: 10px;
        fill: #94A3B8;
      }
      .label-normal {
        font-family: 'Outfit', sans-serif;
        font-weight: 500;
        font-size: 12px;
        fill: #F8FAFC;
      }
      .label-desc {
        font-family: 'Outfit', sans-serif;
        font-weight: 400;
        font-size: 10px;
        fill: #64748B;
      }
      .layer-tag {
        font-family: 'JetBrains Mono', monospace;
        font-weight: 700;
        font-size: 11px;
        fill: #06B6D4;
        letter-spacing: 0.1em;
      }
      
      /* CSS Animations */
      .packet-flow {
        animation: flowPattern 5s infinite linear;
      }
      .packet-flow-fast {
        animation: flowPattern 3s infinite linear;
      }
      .pulse-beacon {
        animation: beaconPulse 2s infinite ease-in-out;
      }
      .slow-glow {
        animation: ambientGlow 4s infinite ease-in-out;
      }
      
      @keyframes flowPattern {
        from { stroke-dashoffset: 100; }
        to { stroke-dashoffset: 0; }
      }
      @keyframes beaconPulse {
        0%, 100% { transform: scale(1); opacity: 0.2; }
        50% { transform: scale(1.3); opacity: 0.7; }
      }
      @keyframes ambientGlow {
        0%, 100% { opacity: 0.15; }
        50% { opacity: 0.35; }
      }
    </style>
    
    <!-- Glow Filters -->
    <filter id="glowCyan" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="glowIndigo" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="glowEmergency" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-opacity="0.02" stroke-width="1" />
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="#030712" />
  <rect width="100%" height="100%" fill="url(#grid)" />

  <!-- LAYERS SEPARATORS -->
  <line x1="50" y1="120" x2="1150" y2="120" stroke="#ffffff" stroke-opacity="0.05" stroke-dasharray="4 4" />
  <line x1="50" y1="260" x2="1150" y2="260" stroke="#ffffff" stroke-opacity="0.05" stroke-dasharray="4 4" />
  <line x1="50" y1="390" x2="1150" y2="390" stroke="#ffffff" stroke-opacity="0.05" stroke-dasharray="4 4" />

  <!-- LAYER LABELS -->
  <text x="50" y="40" class="layer-tag">L4: HUMAN INTERFACE LAYER</text>
  <text x="50" y="150" class="layer-tag">L3: DISTRIBUTED CLOUD ENVIRONMENT</text>
  <text x="50" y="290" class="layer-tag">L2: HYBRID GATEWAY LAYER</text>
  <text x="50" y="420" class="layer-tag">L1: EMBEDDED EDGE SENSOR LAYER</text>


  <!-- STATIC PATHS -->
  <!-- L1 -> L2 Connections -->
  <path d="M 200 460 L 500 340" stroke="#8B5CF6" stroke-opacity="0.15" stroke-width="1.5" />
  <path d="M 400 460 L 500 340" stroke="#06B6D4" stroke-opacity="0.15" stroke-width="1.5" />
  <path d="M 600 460 L 600 340" stroke="#06B6D4" stroke-opacity="0.15" stroke-width="1.5" />
  <path d="M 800 460 L 700 340" stroke="#8B5CF6" stroke-opacity="0.15" stroke-width="1.5" />
  <path d="M 1000 460 L 700 340" stroke="#8B5CF6" stroke-opacity="0.15" stroke-width="1.5" />

  <!-- L2 -> L3 Connections -->
  <path d="M 500 310 L 350 200" stroke="#06B6D4" stroke-opacity="0.15" stroke-width="1.5" />
  <path d="M 600 310 L 600 200" stroke="#4F46E5" stroke-opacity="0.2" stroke-width="2" />
  <path d="M 700 310 L 850 200" stroke="#4F46E5" stroke-opacity="0.15" stroke-width="1.5" />

  <!-- L3 Internal Mesh connections -->
  <path d="M 350 200 L 600 200" stroke="#4F46E5" stroke-opacity="0.2" stroke-width="2" />
  <path d="M 600 200 L 850 200" stroke="#4F46E5" stroke-opacity="0.2" stroke-width="2" />

  <!-- L3 -> L4 Connections -->
  <path d="M 350 170 L 350 80" stroke="#EF4444" stroke-opacity="0.15" stroke-width="1.5" />
  <path d="M 600 170 L 600 80" stroke="#4F46E5" stroke-opacity="0.2" stroke-width="2" />
  <path d="M 850 170 L 850 80" stroke="#EF4444" stroke-opacity="0.15" stroke-width="1.5" />


  <!-- ANIMATED SIGNAL FLOWS -->
  <!-- L1 edge telemetry reporting -->
  <path d="M 200 460 L 500 340" stroke="#8B5CF6" stroke-opacity="0.8" stroke-width="1.5" stroke-linecap="round" stroke-dasharray="8 60" class="packet-flow" />
  <path d="M 600 460 L 600 340" stroke="#06B6D4" stroke-opacity="0.8" stroke-width="1.5" stroke-linecap="round" stroke-dasharray="6 45" class="packet-flow" />
  <path d="M 1000 460 L 700 340" stroke="#8B5CF6" stroke-opacity="0.8" stroke-width="1.5" stroke-linecap="round" stroke-dasharray="10 80" class="packet-flow" />

  <!-- Gateway uplink -->
  <path d="M 500 310 L 350 200" stroke="#06B6D4" stroke-opacity="0.8" stroke-width="2" stroke-linecap="round" stroke-dasharray="12 80" class="packet-flow-fast" />
  <path d="M 600 310 L 600 200" stroke="#4F46E5" stroke-opacity="0.9" stroke-width="2" stroke-linecap="round" stroke-dasharray="10 90" class="packet-flow" />

  <!-- Cloud WebSocket telemetry downstream -->
  <path d="M 350 170 L 350 80" stroke="#EF4444" stroke-opacity="0.9" stroke-width="2" stroke-linecap="round" stroke-dasharray="12 70" class="packet-flow-fast" />
  <path d="M 600 170 L 600 80" stroke="#4F46E5" stroke-opacity="0.8" stroke-width="2.5" stroke-linecap="round" stroke-dasharray="15 100" class="packet-flow" />


  <!-- ================= L4 NODE CARDS ================= -->
  <!-- NODE: Flutter Ambulance UI -->
  <g transform="translate(350, 80)">
    <rect x="-80" y="-30" width="160" height="60" rx="8" fill="#111827" fill-opacity="0.9" stroke="#EF4444" stroke-width="1.5" filter="url(#glowEmergency)" />
    <circle cx="-60" cy="0" r="10" fill="#1f2937" stroke="#EF4444" stroke-width="1" />
    <path d="M -63 0 L -60 -4 L -57 0 L -63 0" fill="#EF4444" />
    <text x="-40" y="-5" class="label-normal">Ambulance Client</text>
    <text x="-40" y="8" class="label-desc">Flutter (Android/iOS)</text>
    <text x="-40" y="18" class="label-mono" fill="#EF4444">RT_LATENCY: 42ms</text>
  </g>

  <!-- NODE: Web Operations Dashboard -->
  <g transform="translate(600, 80)">
    <rect x="-80" y="-30" width="160" height="60" rx="8" fill="#111827" fill-opacity="0.9" stroke="#4F46E5" stroke-width="1.5" />
    <rect x="-68" y="-12" width="16" height="24" rx="2" fill="#1f2937" stroke="#4F46E5" stroke-width="1" />
    <text x="-40" y="-5" class="label-normal">Operations Web</text>
    <text x="-40" y="8" class="label-desc">React / Vite App</text>
    <text x="-40" y="18" class="label-mono" fill="#4F46E5">SOCKETS: CONNECTED</text>
  </g>

  <!-- NODE: Hospital Dispatch Console -->
  <g transform="translate(850, 80)">
    <rect x="-80" y="-30" width="160" height="60" rx="8" fill="#111827" fill-opacity="0.9" stroke="#EF4444" stroke-width="1.5" />
    <circle cx="-60" cy="0" r="10" fill="#1f2937" stroke="#EF4444" stroke-width="1" />
    <circle cx="-60" cy="0" r="4" fill="#EF4444" class="pulse-beacon" />
    <text x="-40" y="-5" class="label-normal">Hospital Terminal</text>
    <text x="-40" y="8" class="label-desc">Django / Web GIS</text>
    <text x="-40" y="18" class="label-mono" fill="#EF4444">NODE_STATUS: ONLINE</text>
  </g>


  <!-- ================= L3 NODE CARDS ================= -->
  <!-- NODE: WebSockets API Gateway -->
  <g transform="translate(350, 200)">
    <rect x="-80" y="-35" width="160" height="70" rx="8" fill="#111827" stroke="#06B6D4" stroke-width="1.5" />
    <text x="-70" y="-15" class="label-normal" fill="#06B6D4">API GATEWAY</text>
    <text x="-70" y="0" class="label-desc">HTTP &amp; WebSocket Proxy</text>
    <text x="-70" y="14" class="label-mono">Nginx / Django channels</text>
    <text x="-70" y="25" class="label-mono" fill="#22C55E">ACTIVE_CONN: 1.4K</text>
  </g>

  <!-- NODE: Django Services (Kubernetes Pods) -->
  <g transform="translate(600, 200)">
    <rect x="-90" y="-35" width="180" height="70" rx="8" fill="#111827" stroke="#4F46E5" stroke-width="2" />
    <rect x="-78" y="-20" width="8" height="8" rx="1" fill="#4F46E5" />
    <rect x="-78" y="-8" width="8" height="8" rx="1" fill="#4F46E5" />
    <rect x="-78" y="4" width="8" height="8" rx="1" fill="#4F46E5" />
    <text x="-62" y="-12" class="label-normal">Kubernetes Cluster</text>
    <text x="-62" y="3" class="label-desc">Django REST Services</text>
    <text x="-62" y="15" class="label-mono">Uptime: 99.998%</text>
    <text x="-62" y="26" class="label-mono" fill="#06B6D4">REPLICAS: 8 ACTIVE</text>
  </g>

  <!-- NODE: PostgreSQL & Cache Storage -->
  <g transform="translate(850, 200)">
    <rect x="-80" y="-35" width="160" height="70" rx="8" fill="#111827" stroke="#8B5CF6" stroke-width="1.5" />
    <text x="-70" y="-15" class="label-normal" fill="#8B5CF6">DATA &amp; CACHE</text>
    <text x="-70" y="0" class="label-desc">PostgreSQL DB Cluster</text>
    <text x="-70" y="14" class="label-mono">Redis Queue / Broker</text>
    <text x="-70" y="25" class="label-mono" fill="#22C55E">POOL_STATUS: READY</text>
  </g>


  <!-- ================= L2 NODE CARDS ================= -->
  <!-- NODE: Field Edge Router (LoRa + LTE) -->
  <g transform="translate(500, 310)">
    <rect x="-80" y="-25" width="160" height="50" rx="6" fill="#111827" stroke="#06B6D4" stroke-width="1.5" />
    <text x="-70" y="-10" class="label-normal">LoRa Edge Gateway</text>
    <text x="-70" y="5" class="label-desc">MQTT Bridge / SQLite Cache</text>
    <text x="-70" y="18" class="label-mono" fill="#06B6D4">UPLINK: CELLULAR / BLE</text>
  </g>

  <!-- NODE: Database local buffer -->
  <g transform="translate(700, 310)">
    <rect x="-80" y="-25" width="160" height="50" rx="6" fill="#111827" stroke="#8B5CF6" stroke-width="1.5" />
    <text x="-70" y="-10" class="label-normal">Failover buffer</text>
    <text x="-70" y="5" class="label-desc">Offline spool / encryption</text>
    <text x="-70" y="18" class="label-mono" fill="#8B5CF6">BUFFER_SIZE: 0B (SYNCED)</text>
  </g>


  <!-- ================= L1 NODE CARDS ================= -->
  <!-- NODE: ESP32 Tracker -->
  <g transform="translate(200, 460)">
    <circle cx="0" cy="0" r="22" fill="#111827" stroke="#8B5CF6" stroke-width="1.5" />
    <rect x="-12" y="-12" width="24" height="24" rx="3" fill="#1f2937" stroke="#8B5CF6" stroke-width="1" />
    <text x="30" y="-5" class="label-normal">ESP32 GNSS</text>
    <text x="30" y="8" class="label-desc">GNSS Coordinate Beacon</text>
    <text x="30" y="18" class="label-mono" fill="#8B5CF6">BAND: 868MHz (LoRa)</text>
  </g>

  <!-- NODE: Emergency Wearable Sensor -->
  <g transform="translate(400, 460)">
    <circle cx="0" cy="0" r="22" fill="#111827" stroke="#06B6D4" stroke-width="1.5" />
    <path d="M -10 0 L -6 -5 L -2 5 L 2 -5 L 6 5 L 10 0" stroke="#06B6D4" stroke-width="1.5" fill="none" />
    <text x="30" y="-5" class="label-normal">Biometric Edge</text>
    <text x="30" y="8" class="label-desc">Pulse/ECG telemetry node</text>
    <text x="30" y="18" class="label-mono" fill="#06B6D4">TX_FREQ: 1.0 Hz</text>
  </g>

  <!-- NODE: LoRa Relay Node -->
  <g transform="translate(600, 460)">
    <circle cx="0" cy="0" r="22" fill="#111827" stroke="#06B6D4" stroke-width="1.5" />
    <circle cx="0" cy="0" r="8" stroke="#06B6D4" stroke-width="1" class="pulse-beacon" />
    <text x="30" y="-5" class="label-normal">Mesh Repeater</text>
    <text x="30" y="8" class="label-desc">LoRa Mesh Node relay</text>
    <text x="30" y="18" class="label-mono" fill="#06B6D4">HOPS: 2 (STABLE)</text>
  </g>

  <!-- NODE: Field Beacon sensors -->
  <g transform="translate(800, 460)">
    <circle cx="0" cy="0" r="22" fill="#111827" stroke="#8B5CF6" stroke-width="1.5" />
    <ellipse cx="0" cy="0" rx="12" ry="5" stroke="#8B5CF6" stroke-width="1" />
    <text x="30" y="-5" class="label-normal">BLE Environment</text>
    <text x="30" y="8" class="label-desc">Sensor beacon cluster</text>
    <text x="30" y="18" class="label-mono" fill="#8B5CF6">RSSI: -68 dBm</text>
  </g>

  <!-- NODE: Backup Field telemetry -->
  <g transform="translate(1000, 460)">
    <circle cx="0" cy="0" r="22" fill="#111827" stroke="#8B5CF6" stroke-width="1.5" />
    <rect x="-8" y="-8" width="16" height="16" fill="#8B5CF6" fill-opacity="0.1" stroke="#8B5CF6" stroke-width="1" />
    <text x="-120" y="-5" class="label-normal" text-anchor="end">Satelite Sync</text>
    <text x="-120" y="8" class="label-desc" text-anchor="end">Direct-to-Satellite Fallback</text>
    <text x="-120" y="18" class="label-mono" text-anchor="end" fill="#8B5CF6">UPLINK_SYS: GNSS_M1</text>
  </g>
</svg>
