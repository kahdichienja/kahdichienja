<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 120" width="100%" height="100%" fill="none">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@600&amp;family=JetBrains+Mono:wght@400;700&amp;display=swap');
      
      .foot-title {
        font-family: 'Outfit', sans-serif;
        font-size: 11px;
        fill: #F8FAFC;
        letter-spacing: 0.05em;
      }
      .foot-desc {
        font-family: 'Outfit', sans-serif;
        font-size: 10px;
        fill: #64748B;
      }
      .foot-mono {
        font-family: 'JetBrains Mono', monospace;
        font-size: 9px;
        fill: #94A3B8;
      }
      
      /* ECG Animation */
      .ecg-sweep {
        stroke-dasharray: 200 800;
        animation: ecgSweep 3.5s infinite linear;
      }
      .pulse-dot {
        animation: statusPulse 1.8s infinite ease-in-out;
      }
      
      @keyframes ecgSweep {
        0% { stroke-dashoffset: 1000; }
        100% { stroke-dashoffset: 0; }
      }
      @keyframes statusPulse {
        0%, 100% { transform: scale(1); opacity: 0.4; }
        50% { transform: scale(1.4); opacity: 1; }
      }
    </style>
    
    <filter id="glowGreen" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Deep Canvas -->
  <rect width="100%" height="100%" fill="#030712" stroke="#ffffff" stroke-opacity="0.04" stroke-width="1" />

  <!-- DOTTED BACKDROP -->
  <path d="M 0 30 L 1200 30 M 0 90 L 1200 90" stroke="#ffffff" stroke-opacity="0.015" stroke-width="1" />

  <!-- LEFT: System Health -->
  <g transform="translate(40, 45)">
    <!-- Status Dot -->
    <circle cx="15" cy="15" r="5" fill="#22C55E" filter="url(#glowGreen)" />
    <circle cx="15" cy="15" r="8" stroke="#22C55E" stroke-width="1.5" class="pulse-dot" />
    <text x="35" y="14" class="foot-title">SYSTEM STATUS: NOMINAL</text>
    <text x="35" y="27" class="foot-desc">Secure end-to-end communication channels active</text>
  </g>

  <!-- CENTER: Animated ECG waveform -->
  <!-- Background static trace -->
  <path d="M 400 60 L 500 60 L 508 50 L 513 70 L 521 20 L 529 100 L 537 60 L 545 60 L 553 55 L 557 65 L 561 60 L 680 60 L 688 50 L 693 70 L 701 20 L 709 100 L 717 60 L 725 60 L 733 55 L 737 65 L 741 60 L 800 60" stroke="#22C55E" stroke-opacity="0.08" stroke-width="1.5" fill="none" />
  <!-- Animating sweeping pulse -->
  <path d="M 400 60 L 500 60 L 508 50 L 513 70 L 521 20 L 529 100 L 537 60 L 545 60 L 553 55 L 557 65 L 561 60 L 680 60 L 688 50 L 693 70 L 701 20 L 709 100 L 717 60 L 725 60 L 733 55 L 737 65 L 741 60 L 800 60" stroke="#22C55E" stroke-width="2" stroke-linecap="round" fill="none" class="ecg-sweep" filter="url(#glowGreen)" />

  <!-- RIGHT: System telemetry metrics -->
  <g transform="translate(920, 35)" class="foot-mono">
    <text x="0" y="10" fill="#06B6D4" font-weight="700">TELEMETRY DIAGNOSTICS</text>
    <text x="0" y="25">GNSS SATELLITES: 14 CONNECTED</text>
    <text x="0" y="40">LORA EDGE NODES: 42 ONLINE</text>
    <text x="0" y="55">SECURITY TUNNELS: TLS_1.3 ACTIVE</text>
  </g>
</svg>
