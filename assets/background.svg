<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="100%" height="100%" fill="none">
  <defs>
    <filter id="aurora" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="80" />
    </filter>
  </defs>
  
  <!-- Base background color -->
  <rect width="100%" height="100%" fill="#030712" />

  <!-- Dotted blueprint grid pattern -->
  <g opacity="0.1">
    <pattern id="bgGrid" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.5" fill="#ffffff" />
    </pattern>
    <rect width="100%" height="100%" fill="url(#bgGrid)" />
  </g>

  <!-- Glowing aurora accents -->
  <g filter="url(#aurora)" opacity="0.5">
    <circle cx="300" cy="200" r="250" fill="#4F46E5" opacity="0.4" />
    <circle cx="900" cy="500" r="220" fill="#06B6D4" opacity="0.35" />
    <circle cx="600" cy="800" r="300" fill="#8B5CF6" opacity="0.3" />
  </g>
</svg>
